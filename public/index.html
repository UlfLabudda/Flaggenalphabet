<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maritimes Flaggenalphabet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Maritimes Flaggenalphabet</h1>
    <p class="subtitle">International Code of Signals (ICS)</p>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-filter="all">Alle</button>
    <button class="tab-btn" data-filter="letter">Buchstaben</button>
    <button class="tab-btn" data-filter="numeral">Zahlen</button>
    <button class="tab-btn" data-filter="substitute">Sonderflaggen</button>
    <button class="tab-btn" data-filter="quiz">Quiz</button>
  </nav>

  <div class="search-bar" id="search-bar">
    <input type="text" id="search-input" placeholder="Suchen nach Buchstabe, Name oder Bedeutung..." />
  </div>

  <main>
    <div id="flags-container" class="flags-grid"></div>

    <div id="quiz-container" class="quiz-container hidden">
      <div class="quiz-score" id="quiz-score">0 von 0 richtig</div>
      <div class="quiz-card">
        <div class="quiz-flag" id="quiz-flag"></div>
        <div class="quiz-question" id="quiz-question">Welche Flagge ist das?</div>
        <div class="quiz-answers" id="quiz-answers"></div>
        <div class="quiz-feedback" id="quiz-feedback"></div>
        <button class="btn-next hidden" id="btn-next">Nächste Frage</button>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-box">
      <button class="modal-close" id="modal-close">&times;</button>
      <div class="modal-flag" id="modal-flag"></div>
      <div class="modal-info">
        <h2 id="modal-title"></h2>
        <p class="modal-id" id="modal-id"></p>
        <p class="modal-morse" id="modal-morse"></p>
        <p class="modal-meaning" id="modal-meaning"></p>
        <p class="modal-description" id="modal-description"></p>
      </div>
    </div>
  </div>

  <script src="js/flags-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
