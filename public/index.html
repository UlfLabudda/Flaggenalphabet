<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flaggenlexikon – ICS & Länderflaggen</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <h1>Flaggenlexikon</h1>
      <p class="subtitle">Maritimes Flaggenalphabet &amp; Länderflaggen der Welt</p>
    </div>
  </header>

  <!-- ── Modus-Umschalter ──────────────────────────── -->
  <nav class="mode-nav">
    <button class="mode-btn active" data-mode="ics">
      ⚓ ICS Flaggenalphabet
    </button>
    <button class="mode-btn" data-mode="countries">
      🌍 Länderflaggen
    </button>
  </nav>

  <!-- ══════════════════════════════════════════════════
       ICS-SEKTION (bestehend)
  ══════════════════════════════════════════════════ -->
  <div id="ics-section">

    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="all">Alle</button>
      <button class="tab-btn" data-tab="letter">Buchstaben</button>
      <button class="tab-btn" data-tab="numeral">Zahlen</button>
      <button class="tab-btn" data-tab="special">Sonderflaggen</button>
      <button class="tab-btn" data-tab="quiz">Quiz</button>
    </nav>

    <main>
      <div id="browse-view">
        <div class="search-bar">
          <input type="text" id="search-input"
                 placeholder="Flagge suchen (z.B. Alfa, B, Mann über Bord …)" />
          <span id="result-count"></span>
        </div>
        <div id="flags-grid"></div>
      </div>

      <div id="quiz-view" class="hidden">
        <div class="quiz-panel">
          <div class="quiz-stats">
            <span id="quiz-score">0</span> / <span id="quiz-total">0</span> richtig
            <span id="quiz-streak" class="streak"></span>
          </div>
          <div id="quiz-flag-display"></div>
          <p id="quiz-question">Was bedeutet diese Flagge?</p>
          <div id="quiz-options"></div>
          <div id="quiz-feedback" class="hidden"></div>
          <button id="quiz-next" class="btn-primary hidden">Weiter →</button>
          <button id="quiz-restart" class="btn-secondary">Neu starten</button>
        </div>
      </div>
    </main>

    <!-- ICS Modal -->
    <div id="modal-overlay" class="hidden">
      <div id="modal">
        <button id="modal-close" aria-label="Schließen">✕</button>
        <div id="modal-flag-svg"></div>
        <div class="modal-info">
          <div class="modal-header">
            <span class="modal-id"></span>
            <span class="modal-phonetic"></span>
            <span class="modal-morse"></span>
          </div>
          <h2 class="modal-meaning"></h2>
          <p class="modal-description"></p>
          <p class="modal-type-label"></p>
        </div>
      </div>
    </div>

  </div><!-- /ics-section -->


  <!-- ══════════════════════════════════════════════════
       LÄNDERFLAGGEN-SEKTION (neu)
  ══════════════════════════════════════════════════ -->
  <div id="countries-section" class="hidden">

    <!-- Kontinent-Navigation -->
    <nav class="continent-nav">
      <button class="continent-btn active" data-continent="africa">🌍 Afrika</button>
      <button class="continent-btn" data-continent="asia">🌏 Asien</button>
      <button class="continent-btn" data-continent="europe">🌐 Europa</button>
      <button class="continent-btn" data-continent="north_america">🌎 Nordamerika</button>
      <button class="continent-btn" data-continent="south_america">🌎 Südamerika</button>
    </nav>

    <!-- Suche -->
    <div class="country-search-bar">
      <input type="text" id="country-search"
             placeholder="Land, Hauptstadt oder Staatsoberhaupt suchen …" />
      <span id="country-count"></span>
    </div>

    <!-- Länder-Grid -->
    <div id="countries-grid" class="countries-grid"></div>

    <!-- Länder-Modal -->
    <div id="country-modal" class="modal-overlay hidden">
      <div class="cmodal-box">
        <button id="country-modal-close" class="modal-close-btn" aria-label="Schließen">✕</button>
        <div id="country-modal-body"></div>
      </div>
    </div>

  </div><!-- /countries-section -->


  <!-- ── Scripts ──────────────────────────────────── -->
  <!-- ICS Flaggenalphabet -->
  <script src="js/flags-data.js"></script>
  <script src="js/app.js"></script>
  <!-- Länderflaggen -->
  <script src="js/africa-data.js"></script>
  <script src="js/country-app.js"></script>

</body>
</html>
