<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maritimes Flaggenalphabet – ICS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <h1>Maritimes Flaggenalphabet</h1>
      <p class="subtitle">International Code of Signals (ICS) — alle Signalflaggen</p>
    </div>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="all">Alle</button>
    <button class="tab-btn" data-tab="letter">Buchstaben</button>
    <button class="tab-btn" data-tab="numeral">Zahlen</button>
    <button class="tab-btn" data-tab="special">Sonderflaggen</button>
    <button class="tab-btn" data-tab="quiz">Quiz</button>
  </nav>

  <main>
    <div id="browse-view">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Flagge suchen (z.B. Alfa, B, Mann über Bord …)">
        <span id="result-count"></span>
      </div>
      <div id="flags-grid"></div>
    </div>

    <div id="quiz-view" class="hidden">
      <div class="quiz-panel">
        <div class="quiz-stats">
          <span id="quiz-score">0</span> / <span id="quiz-total">0</span> richtig
          <span id="quiz-streak" class="streak"></span>
        </div>
        <div id="quiz-flag-display"></div>
        <p id="quiz-question">Was bedeutet diese Flagge?</p>
        <div id="quiz-options"></div>
        <div id="quiz-feedback" class="hidden"></div>
        <button id="quiz-next" class="btn-primary hidden">Weiter →</button>
        <button id="quiz-restart" class="btn-secondary">Neu starten</button>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <button id="modal-close" aria-label="Schließen">✕</button>
      <div id="modal-flag-svg"></div>
      <div class="modal-info">
        <div class="modal-header">
          <span class="modal-id"></span>
          <span class="modal-phonetic"></span>
          <span class="modal-morse"></span>
        </div>
        <h2 class="modal-meaning"></h2>
        <p class="modal-description"></p>
        <p class="modal-type-label"></p>
      </div>
    </div>
  </div>

  <script src="js/flags-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
